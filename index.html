<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso de Producción - COOSAJO</title>
    <style>
        :root { --azul: #172e59; --verde: #158e45; --blanco: #ffffff; --fondo: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--fondo); margin: 0; padding: 20px; color: #333; display: flex; flex-direction: column; align-items: center; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .logo { max-width: 180px; margin-bottom: 10px; }
        h1 { color: var(--azul); margin: 0; }
        p { color: #666; margin-top: 5px; }

        .formulario-card { background: var(--blanco); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 600px; }
        
        .grupo-form { margin-bottom: 20px; }
        label.titulo-seccion { display: block; font-weight: bold; margin-bottom: 8px; color: var(--azul); font-size: 0.95rem; border-bottom: 2px solid #e9ecef; padding-bottom: 5px; }
        
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; box-sizing: border-box; font-family: inherit; }
        textarea { resize: vertical; }
        select:focus, input:focus, textarea:focus { outline: none; border-color: var(--verde); box-shadow: 0 0 5px rgba(21, 142, 69, 0.3); }
        
        .grid-servicios { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 10px; }
        .radio-card { position: relative; display: block; }
        .radio-card input { position: absolute; opacity: 0; width: 0; height: 0; }
        .radio-card span { display: flex; align-items: center; justify-content: center; border: 2px solid #ccc; border-radius: 8px; padding: 10px; cursor: pointer; text-align: center; height: 100%; box-sizing: border-box; transition: 0.2s; background: white; font-size: 0.85rem; color: #555; font-weight: 600; user-select: none; }
        .radio-card input:checked + span { background-color: var(--azul); color: white; border-color: var(--azul); }
        .radio-card span:hover { border-color: var(--azul); }

        .botones-container { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .btn-guardar { background-color: var(--verde); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-guardar:hover { background-color: #117538; }
        .btn-guardar:disabled { background-color: #95cfa9; cursor: not-allowed; }
        .btn-dashboard { background-color: var(--azul); color: white; text-align: center; text-decoration: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; transition: 0.3s; }
        .btn-dashboard:hover { background-color: #102140; }

        #mensaje-exito { display: none; background-color: #d4edda; color: #155724; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" alt="COOSAJO" class="logo" onerror="this.style.display='none'">
        <h1>Registro de Producción</h1>
        <p>Ingresa los datos para calcular el ahorro in-house</p>
    </div>

    <div class="formulario-card">
        
        <div id="mensaje-exito">✅ ¡Registro guardado con éxito!</div>

        <form id="formProduccion">
            <div class="grupo-form" style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label class="titulo-seccion">Mes:</label>
                    <select id="mes" required>
                        <option value="" disabled selected>Elige...</option>
                        <option value="Enero">Enero</option><option value="Febrero">Febrero</option>
                        <option value="Marzo">Marzo</option><option value="Abril">Abril</option>
                        <option value="Mayo">Mayo</option><option value="Junio">Junio</option>
                        <option value="Julio">Julio</option><option value="Agosto">Agosto</option>
                        <option value="Septiembre">Septiembre</option><option value="Octubre">Octubre</option>
                        <option value="Noviembre">Noviembre</option><option value="Diciembre">Diciembre</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label class="titulo-seccion">Proyecto / Evento:</label>
                    <select id="marca" required>
                        <option value="" disabled selected>Elige...</option>
                        <option value="Coosajo">Coosajo</option>
                        <option value="MiPequeñaAsamblea">MiPequeñaAsamblea</option>
                        <option value="Asamblea General">Asamblea General</option>
                        <option value="21k">21k</option>
                        <option value="EJES">EJES</option> 
                    </select>
                </div>
            </div>

            <div class="grupo-form">
                <label class="titulo-seccion" id="titulo-servicio">Tipo de Servicio:</label>
                
                <div class="grid-servicios" id="grid-servicios-normal"></div>

                <div class="grid-servicios" id="grid-servicios-ejes" style="display: none;">
                    <label class="radio-card"><input type="radio" name="servicio_radio" value="Comercialización"><span>Comercialización</span></label>
                    <label class="radio-card"><input type="radio" name="servicio_radio" value="Vinculación"><span>Vinculación</span></label>
                    <label class="radio-card"><input type="radio" name="servicio_radio" value="Educación"><span>Educación</span></label>
                </div>
            </div>

            <div class="grupo-form" id="caja-descripcion" style="display: none;">
                <label class="titulo-seccion">Detalle o Comentarios:</label>
                <textarea id="descripcion" rows="2" placeholder="Especifica de qué trata..."></textarea>
            </div>

            <div class="grupo-form" style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label class="titulo-seccion">Cantidad:</label>
                    <input type="number" id="cantidad" min="1" required placeholder="Ej. 5">
                </div>
                <div style="flex: 1; display: none;" id="caja-costo">
                    <label class="titulo-seccion" id="label-costo">Costo Unitario (Q):</label>
                    <input type="number" id="costo_unitario" min="0" placeholder="Ingresa valor...">
                </div>
            </div>

            <div class="botones-container">
                <button type="submit" id="btnGuardar" class="btn-guardar">💾 Guardar Registro</button>
                <a href="dashboard.html" class="btn-dashboard">📊 Ir al Dashboard Oficial</a>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACfn6C6_XqLDQI29f6uHUUwlCQkSCXNYk",
            authDomain: "costos-comunicacion-digital.firebaseapp.com",
            projectId: "costos-comunicacion-digital",
            storageBucket: "costos-comunicacion-digital.firebasestorage.app",
            messagingSenderId: "299496606379",
            appId: "1:299496606379:web:a4d6609ff79eebff0c85ee"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Agregamos los Ejes a la lista de precios fijos valiendo lo mismo que un Post (Q275)
        const listaPreciosFijos = {
            "Afiches o Banners": 350,    
            "Infografías": 300,
            "Videos": 2000,               
            "Animaciones": 1500,         
            "Jingles": 3500,
            "Reportaje": 2800,
            "En vivos": 1250,            
            "Post": 275,                  
            "Historias": 150,             
            "Cobertura de fotos": 2800,   
            "Fotos de Estudio": 800,     
            "Tomas de Drone": 800,       
            "Reels": 650,
            "Comercialización": 275,
            "Vinculación": 275,
            "Educación": 275                 
        };

        const serviciosOrdenados = [
            "Afiches o Banners", "Infografías", "Videos", "Animaciones", 
            "Jingles", "Reportaje", "En vivos", "Post", "Historias", 
            "Cobertura de fotos", "Fotos de Estudio", "Tomas de Drone", 
            "Reels", "Audio", "Diseños Gráficos Generales"
        ];

        const gridNormal = document.getElementById('grid-servicios-normal');
        const gridEjes = document.getElementById('grid-servicios-ejes');
        
        serviciosOrdenados.forEach(serv => {
            const label = document.createElement('label');
            label.className = 'radio-card';
            label.innerHTML = `<input type="radio" name="servicio_radio" value="${serv}"><span>${serv}</span>`;
            gridNormal.appendChild(label);
        });

        const formulario = document.getElementById('formProduccion');
        const selectMarca = document.getElementById('marca');
        const btnGuardar = document.getElementById('btnGuardar');
        const mensajeExito = document.getElementById('mensaje-exito');
        const tituloServicio = document.getElementById('titulo-servicio');
        
        const cajaCosto = document.getElementById('caja-costo');
        const inputCosto = document.getElementById('costo_unitario');
        const labelCosto = document.getElementById('label-costo');
        
        const cajaDescripcion = document.getElementById('caja-descripcion');
        const inputDescripcion = document.getElementById('descripcion');

        // Ocultar/Mostrar sub-menú de EJES
        selectMarca.addEventListener('change', (e) => {
            const checkedRadio = document.querySelector('input[name="servicio_radio"]:checked');
            if (checkedRadio) checkedRadio.checked = false;

            cajaDescripcion.style.display = 'none';
            cajaCosto.style.display = 'none';
            inputDescripcion.required = false;
            inputCosto.required = false;

            if (e.target.value === 'EJES') {
                gridNormal.style.display = 'none';
                gridEjes.style.display = 'grid';
                tituloServicio.innerText = 'Selecciona el Eje:';
                document.querySelectorAll('#grid-servicios-ejes input').forEach(r => r.required = true);
                document.querySelectorAll('#grid-servicios-normal input').forEach(r => r.required = false);
            } else {
                gridNormal.style.display = 'grid';
                gridEjes.style.display = 'none';
                tituloServicio.innerText = 'Tipo de Servicio:';
                document.querySelectorAll('#grid-servicios-normal input').forEach(r => r.required = true);
                document.querySelectorAll('#grid-servicios-ejes input').forEach(r => r.required = false);
            }
        });

        // Solo "Diseño" y "Audio" muestran opciones manuales ahora
        document.addEventListener('change', (e) => {
            if (e.target.name === 'servicio_radio') {
                const serv = e.target.value;

                if (serv === 'Diseños Gráficos Generales') {
                    cajaDescripcion.style.display = 'block';
                    inputDescripcion.required = true;
                    cajaCosto.style.display = 'block';
                    inputCosto.required = true;
                    inputCosto.value = '';
                    labelCosto.innerText = `Costo de ${serv} (Q):`;

                } else if (serv === 'Audio') {
                    cajaDescripcion.style.display = 'none';
                    inputDescripcion.required = false;
                    inputDescripcion.value = '';
                    cajaCosto.style.display = 'block';
                    inputCosto.required = true;
                    inputCosto.value = '';
                    labelCosto.innerText = 'Precio del Audio (Q):';

                } else {
                    // CUALQUIER OTRO (incluyendo los EJES) se esconde la caja y usa el precio fijo
                    cajaDescripcion.style.display = 'none';
                    inputDescripcion.required = false;
                    inputDescripcion.value = '';
                    cajaCosto.style.display = 'none';
                    inputCosto.required = false;
                    inputCosto.value = listaPreciosFijos[serv] || 0;
                }
            }
        });

        formulario.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            btnGuardar.innerText = "Guardando...";
            btnGuardar.disabled = true;

            const mes = document.getElementById('mes').value;
            const marca = document.getElementById('marca').value;
            const servicio = document.querySelector('input[name="servicio_radio"]:checked').value;
            const cantidad = parseInt(document.getElementById('cantidad').value);
            const costoUnitario = parseFloat(document.getElementById('costo_unitario').value);
            const descripcion = inputDescripcion.value;
            
            const totalAhorro = cantidad * costoUnitario;

            try {
                await addDoc(collection(db, "costos_publicidad"), {
                    mes: mes,
                    marca: marca,
                    servicio: servicio,
                    descripcion: descripcion,
                    cantidad: cantidad,
                    total: totalAhorro,
                    fecha_registro: new Date()
                });

                mensajeExito.style.display = 'block';
                formulario.reset();
                
                cajaDescripcion.style.display = 'none';
                cajaCosto.style.display = 'none';
                inputCosto.required = false;
                
                gridNormal.style.display = 'grid';
                gridEjes.style.display = 'none';
                tituloServicio.innerText = 'Tipo de Servicio:';

                setTimeout(() => {
                    mensajeExito.style.display = 'none';
                }, 3000);

            } catch (error) {
                console.error("Error al guardar: ", error);
                alert("Hubo un error al guardar.");
            } finally {
                btnGuardar.innerText = "💾 Guardar Registro";
                btnGuardar.disabled = false;
            }
        });
    </script>
</body>
</html>
