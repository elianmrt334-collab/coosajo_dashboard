<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ingreso de Producción</title>
    <style>
        :root { --azul: #172e59; --verde: #158e45; --blanco: #ffffff; --fondo: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--fondo); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .logo { max-width: 180px; margin-bottom: 10px; }
        h1 { color: var(--azul); margin: 0; font-size: 1.5rem; }
        p { color: #666; margin-top: 5px; }

        .login-card { background: var(--blanco); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        
        .grupo-form { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--azul); font-size: 0.95rem; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        input:focus { outline: none; border-color: var(--verde); box-shadow: 0 0 5px rgba(21, 142, 69, 0.3); }
        
        .btn-login { background-color: var(--azul); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-login:hover { background-color: #102140; }
        .btn-login:disabled { background-color: #7b8ba6; cursor: not-allowed; }

        #error-msg { color: #e74c3c; font-weight: bold; text-align: center; margin-bottom: 15px; display: none; }
        
        .setup-link { text-align: center; margin-top: 20px; font-size: 0.8rem; }
        .setup-link a { color: #999; text-decoration: none; cursor: pointer; }
        .setup-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" alt="COOSAJO" class="logo" onerror="this.style.display='none'">
        <h1>Acceso a Producción</h1>
        <p>Inicia sesión con tu correo de agente</p>
    </div>

    <div class="login-card">
        <div id="error-msg"></div>
        <form id="formLogin">
            <div class="grupo-form">
                <label>Correo Electrónico:</label>
                <input type="email" id="email" required placeholder="ej. sjnramirez@micoope.coosajo.com">
            </div>
            <div class="grupo-form">
                <label>Contraseña:</label>
                <input type="password" id="password" required placeholder="Ingresa tu contraseña">
            </div>
            <button type="submit" id="btnLogin" class="btn-login">🔑 Entrar</button>
        </form>
        
        <div class="setup-link">
            <a id="btnSetupUsers">Ejecutar Setup de Usuarios (Solo 1 vez)</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACfn6C6_XqLDQI29f6uHUUwlCQkSCXNYk",
            authDomain: "costos-comunicacion-digital.firebaseapp.com",
            projectId: "costos-comunicacion-digital",
            storageBucket: "costos-comunicacion-digital.firebasestorage.app",
            messagingSenderId: "299496606379",
            appId: "1:299496606379:web:a4d6609ff79eebff0c85ee"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Si ya está logueado, redirigir
        onAuthStateChanged(auth, (user) => {
            if (user && !window.isCreatingUsers) {
                window.location.href = "index.html";
            }
        });

        const formLogin = document.getElementById('formLogin');
        const btnLogin = document.getElementById('btnLogin');
        const errorMsg = document.getElementById('error-msg');

        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();
            btnLogin.disabled = true;
            btnLogin.innerText = "Verificando...";
            errorMsg.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                // La redirección ocurrirá por el onAuthStateChanged
            } catch (error) {
                console.error(error);
                errorMsg.innerText = "❌ Correo o contraseña incorrectos.";
                errorMsg.style.display = 'block';
                btnLogin.disabled = false;
                btnLogin.innerText = "🔑 Entrar";
            }
        });

        // Setup Oculto para crear los usuarios automáticamente
        document.getElementById('btnSetupUsers').addEventListener('click', async () => {
            const password = "Coosajo2041";
            const usuarios = [
                "sjnramirez@micoope.coosajo.com",
                "sjemartinez@micoope.coosajo.com",
                "sjmsalazar@micoope.coosajo.com",
                "sjjardon@micoope.coosajo.com"
            ];
            
            const confirmacion = confirm("Esto creará los 4 usuarios iniciales. ¿Estás seguro?");
            if(!confirmacion) return;
            
            window.isCreatingUsers = true;
            alert("Creando usuarios... espera un momento (la página podría recargarse o hacer sesión automáticamente).");
            
            let creados = 0;
            for(let email of usuarios) {
                try {
                    await createUserWithEmailAndPassword(auth, email, password);
                    console.log(`Creado: ${email}`);
                    creados++;
                } catch (error) {
                    if(error.code === 'auth/email-already-in-use') {
                        console.log(`${email} ya existe.`);
                    } else {
                        console.error(`Error con ${email}:`, error);
                    }
                }
            }
            
            await signOut(auth);
            window.isCreatingUsers = false;
            alert(`¡Proceso terminado! Se crearon ${creados} usuarios nuevos. Ahora puedes iniciar sesión con tu cuenta.`);
        });
    </script>
</body>
</html>
